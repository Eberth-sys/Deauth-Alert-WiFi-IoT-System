name: firmware-build

# CI de compilacion del firmware ESP32 SIN flashear. Matrices: 4 Arduino + 4 ESP-IDF + 4 PlatformIO.
# Gate previo al merge: pull_request con base phase8/event-contract-json. Revalidacion: push a phase8.
on:
  workflow_dispatch:
  pull_request:
    branches: [phase8/event-contract-json]
    paths:
      - 'perception-layer/esp32-nodes-ino/**'
      - 'perception-layer/espidf-nodes/**'
      - '.github/workflows/firmware-build.yml'
      - '.github/scripts/gen_config.sh'
      - 'perception-layer/shared/**'
      - 'processing-layer/src/ble_manager.py'
      # F6a-2: tooling, protocolo y guardas de evidencia deben disparar el CI.
      - 'tools/parse_diag.py'
      - 'tools/tests/test_parse_diag.py'
      - 'docs/lab/**'
      - '.gitignore'
      - 'evidence/**'
      - '**/*.pcap'
      - '**/*.pcapng'
      - '**/run.json'
      - '**/run.json.*'
      - '**/serial.log'
      - '**/alerts.jsonl'
      - '**/diag.jsonl'
  push:
    branches: [phase8/event-contract-json]
    paths:
      - 'perception-layer/esp32-nodes-ino/**'
      - 'perception-layer/espidf-nodes/**'
      - '.github/workflows/firmware-build.yml'
      - '.github/scripts/gen_config.sh'
      - 'perception-layer/shared/**'
      - 'processing-layer/src/ble_manager.py'
      # F6a-2: tooling, protocolo y guardas de evidencia deben disparar el CI.
      - 'tools/parse_diag.py'
      - 'tools/tests/test_parse_diag.py'
      - 'docs/lab/**'
      - '.gitignore'
      - 'evidence/**'
      - '**/*.pcap'
      - '**/*.pcapng'
      - '**/run.json'
      - '**/run.json.*'
      - '**/serial.log'
      - '**/alerts.jsonl'
      - '**/diag.jsonl'

permissions:
  contents: read

jobs:
  guards:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Fallar si hay config.h o .pio versionados
        run: |
          if git ls-files | grep -E '(^|/)config\.h$|(^|/)\.pio/'; then
            echo "::error::Se encontro config.h o .pio versionado (sensible/temporal)"; exit 1
          fi
          echo "OK: no hay config.h ni .pio versionados"
      - name: Fallar si el workflow flashea o accede a dispositivos
        run: |
          # Se excluye la propia linea del grep para no auto-coincidir.
          if grep -nE 'idf\.py[^|&]*flash|arduino-cli[^|&]*upload|pio[^|&]*(-t|--target)[^|&]*upload|write_flash|/dev/tty' \
               .github/workflows/firmware-build.yml | grep -v 'grep -nE'; then
            echo "::error::Comando de flasheo/upload/dispositivo detectado en el workflow"; exit 1
          fi
          echo "OK: el workflow solo compila (sin flash/upload/device)"
      - name: Fallar si hay evidencia cruda de laboratorio versionada (F6a-2)
        run: |
          # La evidencia cruda (PCAP, logs de consola, alerts/diag jsonl, run.json real y
          # cualquier cosa bajo evidence/) puede contener MAC/BSSID/SSID y metadatos de
          # ubicacion: NUNCA se versiona. Se recorre git ls-files DIRECTAMENTE, sin crear
          # archivos temporales en el workspace. La allowlist es por RUTA EXACTA: no basta
          # con terminar en .example ni con llamarse "template".
          malas=0
          while IFS= read -r ruta; do
            if [ "$ruta" = "docs/lab/run.json.example" ]; then
              continue                      # unica ruta documental aprobada
            fi
            prohibida=0
            case "$ruta" in
              evidence/*|*/evidence/*)                          prohibida=1 ;;
              *.pcap|*.pcapng)                                  prohibida=1 ;;
              run.json|*/run.json|run.json.*|*/run.json.*)      prohibida=1 ;;
              serial.log|*/serial.log)                          prohibida=1 ;;
              alerts.jsonl|*/alerts.jsonl)                      prohibida=1 ;;
              diag.jsonl|*/diag.jsonl)                          prohibida=1 ;;
            esac
            if [ "$prohibida" = "1" ]; then
              echo "::error::Evidencia cruda versionada: $ruta"
              malas=$((malas + 1))
            fi
          done < <(git ls-files)
          if [ "$malas" -gt 0 ]; then
            echo "::error::$malas archivo(s) de evidencia cruda rastreados; deben vivir fuera del repositorio"
            exit 1
          fi
          echo "OK: no hay evidencia cruda versionada"

  arduino-cli:
    needs: guards
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node:
          - ESP32_01_Deauth_Detector_CH_01
          - ESP32_02_Deauth_Detector_CH_06
          - ESP32_03_Deauth_Detector_CH_11
          - ESP32_04_Deauth_Detector_SCANN
    env:
      ARDUINO_CLI_VERSION: '1.5.1'
      ESP32_CORE_VERSION: '3.2.0'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Instalar Arduino CLI (version fijada)
        run: |
          # Resiliencia solo en la descarga: --retry 2 = 3 intentos totales (1 + 2), backoff progresivo de curl.
          curl -fsSL --retry 2 --retry-all-errors -o acli.tar.gz \
            "https://downloads.arduino.cc/arduino-cli/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz"
          tar -xf acli.tar.gz arduino-cli
          ./arduino-cli version
      - name: Instalar core esp32:esp32 (version fijada)
        run: |
          # Retry (max 3 intentos, espera progresiva) SOLO en adquisicion; no reintenta compilacion ni verificacion.
          retry() { n=1; max=3; delay=10; until "$@"; do if [ "$n" -ge "$max" ]; then echo "::error::Fallo tras $max intentos: $*"; return 1; fi; echo "Intento $n/$max fallo; reintentando en ${delay}s..."; sleep "$delay"; n=$((n+1)); delay=$((delay*2)); done; }
          ./arduino-cli config init
          ./arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          retry ./arduino-cli core update-index
          retry ./arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}"
          ./arduino-cli core list
      - name: Verificar core fijado (3.2.0)
        run: |
          ./arduino-cli core list | grep -E "esp32:esp32[[:space:]]+${ESP32_CORE_VERSION}" \
            || { echo "::error::core esp32:esp32 != ${ESP32_CORE_VERSION}"; exit 1; }
      - name: Preparar sketch temporal (carpeta == main.ino) + config.h sintetico
        run: |
          # Replica el procedimiento de F4a: el sketch es main.ino en una carpeta con otro
          # nombre; arduino-cli exige carpeta == nombre del .ino. Se copia a un dir temporal
          # (SIN modificar fuentes versionadas).
          mkdir -p build_sketch/main
          cp "perception-layer/esp32-nodes-ino/${{ matrix.node }}/main.ino" build_sketch/main/main.ino
          bash .github/scripts/gen_config.sh build_sketch/main/config.h
      - name: Verificar que el core no define extra_flags propios (F6a-1)
        run: |
          # La inyeccion de -DDEAUTH_DIAG usa compiler.c/cpp.extra_flags SIN autorreferencia:
          # solo es seguro mientras el core los deje VACIOS. Ruta EXACTA de la version fijada y
          # se exigen las dos lineas literales: una clave ausente tambien debe fallar.
          PT="$HOME/.arduino15/packages/esp32/hardware/esp32/${ESP32_CORE_VERSION}/platform.txt"
          echo "platform.txt: $PT"
          if [ ! -f "$PT" ]; then
            echo "::error::No existe $PT (core ${ESP32_CORE_VERSION} no instalado en la ruta esperada)"; exit 1
          fi
          for k in compiler.c.extra_flags compiler.cpp.extra_flags; do
            if ! grep -Fqx "${k}=" "$PT"; then
              echo "::error::Se exige la linea literal '${k}=' (vacia) en $PT"
              grep -nE "^${k}=" "$PT" || echo "(clave ausente)"
              exit 1
            fi
          done
          echo "OK: compiler.c.extra_flags= y compiler.cpp.extra_flags= presentes y vacios en el core ${ESP32_CORE_VERSION}"
      - name: Compilar DIAG=0 y DIAG=1 (Huge APP, sin flashear; build-dirs separados)
        run: |
          for d in 0 1; do
            ./arduino-cli compile --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
              --libraries perception-layer/shared \
              --build-path "$PWD/build_diag${d}" \
              --build-property "compiler.c.extra_flags=-DDEAUTH_DIAG=${d}" \
              --build-property "compiler.cpp.extra_flags=-DDEAUTH_DIAG=${d}" \
              build_sketch/main
          done
      - name: Verificacion estricta DIAG=0/1 (simbolos, strings y secciones)
        run: |
          NM=$(find "$HOME/.arduino15/packages/esp32/tools" -name "xtensa-esp32-elf-nm" -type f | head -1)
          SZ=$(find "$HOME/.arduino15/packages/esp32/tools" -name "xtensa-esp32-elf-size" -type f | head -1)
          if [ -z "$NM" ] || [ -z "$SZ" ]; then echo "::error::toolchain nm/size no encontrado"; exit 1; fi
          ELF0="build_diag0/main.ino.elf"; ELF1="build_diag1/main.ino.elf"
          for d in 0 1; do
            eval "elf=\$ELF${d}"
            # awk (no grep) para contar: con `set -o pipefail` un grep sin coincidencias
            # retorna 1 y abortaria el paso justo en el caso correcto de DIAG=0.
            syms=$("$NM" "$elf" | awk "/deauth_diag_/{n++} END{print n+0}")
            # Marcador EXACTO del formato de DeauthDiag. El patron amplio daba FALSOS POSITIVOS:
            # el core Arduino enlaza esp_diag_variable_* (esp_diagnostics / esp_insights), cuyos
            # nombres contienen la subcadena "diag_v"; ESP-IDF nativo no incluye esos componentes.
            # Conteo con lectura shell pura: no usa grep, que con pipefail aborta al no encontrar.
            marker="[DIAG] {\"diag_v\":%u,"
            strs=0
            amplias=0
            while IFS= read -r line; do
              if [[ "$line" == *"$marker"* ]]; then
                strs=$((strs + 1))
              fi
              case "$line" in
                *"[DIAG]"*|*diag_v*)
                  amplias=$((amplias + 1))
                  if [ "$amplias" -le 5 ]; then echo "  [info] coincidencia amplia (no falla): $line"; fi
                  ;;
              esac
            done < <(strings "$elf")
            echo "== DIAG=$d ($elf) simbolos deauth_diag_*=$syms marcador_exacto=$strs (amplias=$amplias) =="
            if ! "$SZ" -A "$elf" | grep -E "^\.(flash\.(text|rodata)|iram0\.text|dram0\.(data|bss)|text|rodata|data|bss)[[:space:]]" > "sec${d}.txt"; then
              echo "::error::No se capturo ninguna seccion del ELF (DIAG=$d)"; exit 1
            fi
            cat "sec${d}.txt"
            if [ "$d" = "0" ] && { [ "$syms" != "0" ] || [ "$strs" != "0" ]; }; then
              echo "::error::DIAG=0 conserva diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
            if [ "$d" = "1" ] && { [ "$syms" = "0" ] || [ "$strs" = "0" ]; }; then
              echo "::error::DIAG=1 sin diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
          done
          echo "== Secciones: DIAG=0 -> DIAG=1 (delta) =="
          while read -r name v0 _rest; do
            # Lectura shell pura (sin $1/$2 ni awk): inmune al quoting, tambien dentro de bash -c.
            v1=""
            while read -r sec_name sec_size _rest2; do
              if [ "$sec_name" = "$name" ]; then
                v1="$sec_size"
                break
              fi
            done < "sec1.txt"
            if [ -z "$v1" ]; then
              echo "::error::Seccion ${name} presente en DIAG=0 y AUSENTE en DIAG=1"
              exit 1
            fi
            echo "  ${name}: ${v0} -> ${v1} (delta $((v1 - v0)))"
          done < "sec0.txt"
          echo "OK: DIAG=0 limpio y DIAG=1 instrumentado"

  esp-idf:
    needs: guards
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        node:
          - ESP32_01_Deauth_Detector_CH_01
          - ESP32_02_Deauth_Detector_CH_06
          - ESP32_03_Deauth_Detector_CH_11
          - ESP32_04_Deauth_Detector_SCAN
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Generar config.h sintetico (compartido por los nodos ESP-IDF)
        run: bash .github/scripts/gen_config.sh perception-layer/espidf-nodes/config/config.h
      - name: Descargar la imagen ESP-IDF 5.1 (con retry; adquisicion de dependencia)
        run: |
          # Retry (max 3, progresivo) SOLO del pull; luego el build corre una sola vez con la imagen local.
          retry() { n=1; max=3; delay=10; until "$@"; do if [ "$n" -ge "$max" ]; then echo "::error::Fallo tras $max intentos: $*"; return 1; fi; echo "Intento $n/$max fallo; reintentando en ${delay}s..."; sleep "$delay"; n=$((n+1)); delay=$((delay*2)); done; }
          retry docker pull espressif/idf:release-v5.1
      - name: Verificar version ESP-IDF fijada (5.1)
        run: |
          docker run --rm espressif/idf:release-v5.1 idf.py --version | tee idf_ver.txt
          grep -E 'v5\.1' idf_ver.txt || { echo "::error::ESP-IDF != v5.1"; exit 1; }
      - name: Compilar DIAG=0 y DIAG=1 en el contenedor oficial ESP-IDF 5.1 (sin flashear)
        run: |
          # Se monta toda la estructura espidf-nodes para preservar las rutas relativas
          # (../partitions.csv y ../../config/config.h). Un proyecto por nodo.
          # Cada build-dir fija su target EXPLICITAMENTE (-DIDF_TARGET=esp32): no se hereda.
          for d in 0 1; do
            docker run --rm \
              -v "${{ github.workspace }}/perception-layer:/project" \
              -w "/project/espidf-nodes/${{ matrix.node }}" \
              espressif/idf:release-v5.1 \
              idf.py -B "build_diag${d}" -DIDF_TARGET=esp32 -DDEAUTH_DIAG="${d}" build
          done
      - name: Verificacion estricta DIAG=0/1 (simbolos, strings y secciones)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/perception-layer:/project" \
            -w "/project/espidf-nodes/${{ matrix.node }}" \
            espressif/idf:release-v5.1 bash -c '
          set -e
          ELF0=$(ls build_diag0/*.elf | head -1); ELF1=$(ls build_diag1/*.elf | head -1)
          for d in 0 1; do
            eval "elf=\$ELF${d}"
            # awk (no grep) para contar: con `set -o pipefail` un grep sin coincidencias
            # retorna 1 y abortaria el paso justo en el caso correcto de DIAG=0.
            syms=$(xtensa-esp32-elf-nm "$elf" | awk "/deauth_diag_/{n++} END{print n+0}")
            # Marcador EXACTO del formato de DeauthDiag. El patron amplio daba FALSOS POSITIVOS:
            # el core Arduino enlaza esp_diag_variable_* (esp_diagnostics / esp_insights), cuyos
            # nombres contienen la subcadena "diag_v"; ESP-IDF nativo no incluye esos componentes.
            # Conteo con lectura shell pura: no usa grep, que con pipefail aborta al no encontrar.
            marker="[DIAG] {\"diag_v\":%u,"
            strs=0
            amplias=0
            while IFS= read -r line; do
              if [[ "$line" == *"$marker"* ]]; then
                strs=$((strs + 1))
              fi
              case "$line" in
                *"[DIAG]"*|*diag_v*)
                  amplias=$((amplias + 1))
                  if [ "$amplias" -le 5 ]; then echo "  [info] coincidencia amplia (no falla): $line"; fi
                  ;;
              esac
            done < <(strings "$elf")
            echo "== DIAG=$d ($elf) simbolos deauth_diag_*=$syms marcador_exacto=$strs (amplias=$amplias) =="
            if ! xtensa-esp32-elf-size -A "$elf" | grep -E "^\.(flash\.(text|rodata)|iram0\.text|dram0\.(data|bss)|text|rodata|data|bss)[[:space:]]" > "sec${d}.txt"; then
              echo "::error::No se capturo ninguna seccion del ELF (DIAG=$d)"; exit 1
            fi
            cat "sec${d}.txt"
            if [ "$d" = "0" ] && { [ "$syms" != "0" ] || [ "$strs" != "0" ]; }; then
              echo "::error::DIAG=0 conserva diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
            if [ "$d" = "1" ] && { [ "$syms" = "0" ] || [ "$strs" = "0" ]; }; then
              echo "::error::DIAG=1 sin diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
          done
          echo "== Secciones: DIAG=0 -> DIAG=1 (delta) =="
          while read -r name v0 _rest; do
            # Lectura shell pura (sin $1/$2 ni awk): inmune al quoting, tambien dentro de bash -c.
            v1=""
            while read -r sec_name sec_size _rest2; do
              if [ "$sec_name" = "$name" ]; then
                v1="$sec_size"
                break
              fi
            done < "sec1.txt"
            if [ -z "$v1" ]; then
              echo "::error::Seccion ${name} presente en DIAG=0 y AUSENTE en DIAG=1"
              exit 1
            fi
            echo "  ${name}: ${v0} -> ${v1} (delta $((v1 - v0)))"
          done < "sec0.txt"
          echo "OK: DIAG=0 limpio y DIAG=1 instrumentado"
          '

  platformio:
    needs: guards
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node:
          - ESP32_01_Deauth_Detector_CH_01
          - ESP32_02_Deauth_Detector_CH_06
          - ESP32_03_Deauth_Detector_CH_11
          - ESP32_04_Deauth_Detector_SCANN
    env:
      PIO_VERSION: '6.1.16'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Instalar PlatformIO Core (version fijada)
        run: |
          python3 -m pip install --user "platformio==${PIO_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verificar version PlatformIO fijada (6.1.16)
        run: |
          pio --version | grep -E "${PIO_VERSION}" || { echo "::error::PlatformIO != ${PIO_VERSION}"; exit 1; }
      - name: Generar config.h sintetico (por nodo)
        run: bash .github/scripts/gen_config.sh "perception-layer/esp32-nodes-ino/${{ matrix.node }}/config.h"
      - name: Instalar paquetes del proyecto (con retry; plataforma pioarduino + toolchain + esptool)
        run: |
          # Retry (max 3, progresivo) SOLO de la adquisicion de paquetes; el build corre una sola vez despues.
          retry() { n=1; max=3; delay=10; until "$@"; do if [ "$n" -ge "$max" ]; then echo "::error::Fallo tras $max intentos: $*"; return 1; fi; echo "Intento $n/$max fallo; reintentando en ${delay}s..."; sleep "$delay"; n=$((n+1)); delay=$((delay*2)); done; }
          retry pio pkg install -d "perception-layer/esp32-nodes-ino/${{ matrix.node }}"
      - name: Compilar DIAG=0 y DIAG=1 (verbose; reutiliza pio_common.ini + CSV; sin flashear)
        run: |
          set -o pipefail
          for d in 0 1; do
            PLATFORMIO_BUILD_DIR="$PWD/.pio_diag${d}" PLATFORMIO_BUILD_FLAGS="-DDEAUTH_DIAG=${d}" \
              pio run -v -d "perception-layer/esp32-nodes-ino/${{ matrix.node }}" 2>&1 | tee "pio_build_diag${d}.log"
          done
          cp pio_build_diag0.log pio_build.log
      - name: Verificacion estricta DIAG=0/1 (simbolos, strings y secciones)
        run: |
          NM=$(find "$HOME/.platformio/packages" -name "xtensa-esp32-elf-nm" -type f | head -1)
          SZ=$(find "$HOME/.platformio/packages" -name "xtensa-esp32-elf-size" -type f | head -1)
          ELF0=$(find ".pio_diag0" -name "firmware.elf" | head -1)
          ELF1=$(find ".pio_diag1" -name "firmware.elf" | head -1)
          if [ -z "$NM" ] || [ -z "$SZ" ]; then echo "::error::toolchain nm/size no encontrado"; exit 1; fi
          for d in 0 1; do
            eval "elf=\$ELF${d}"
            # awk (no grep) para contar: con `set -o pipefail` un grep sin coincidencias
            # retorna 1 y abortaria el paso justo en el caso correcto de DIAG=0.
            syms=$("$NM" "$elf" | awk "/deauth_diag_/{n++} END{print n+0}")
            # Marcador EXACTO del formato de DeauthDiag. El patron amplio daba FALSOS POSITIVOS:
            # el core Arduino enlaza esp_diag_variable_* (esp_diagnostics / esp_insights), cuyos
            # nombres contienen la subcadena "diag_v"; ESP-IDF nativo no incluye esos componentes.
            # Conteo con lectura shell pura: no usa grep, que con pipefail aborta al no encontrar.
            marker="[DIAG] {\"diag_v\":%u,"
            strs=0
            amplias=0
            while IFS= read -r line; do
              if [[ "$line" == *"$marker"* ]]; then
                strs=$((strs + 1))
              fi
              case "$line" in
                *"[DIAG]"*|*diag_v*)
                  amplias=$((amplias + 1))
                  if [ "$amplias" -le 5 ]; then echo "  [info] coincidencia amplia (no falla): $line"; fi
                  ;;
              esac
            done < <(strings "$elf")
            echo "== DIAG=$d ($elf) simbolos deauth_diag_*=$syms marcador_exacto=$strs (amplias=$amplias) =="
            if ! "$SZ" -A "$elf" | grep -E "^\.(flash\.(text|rodata)|iram0\.text|dram0\.(data|bss)|text|rodata|data|bss)[[:space:]]" > "sec${d}.txt"; then
              echo "::error::No se capturo ninguna seccion del ELF (DIAG=$d)"; exit 1
            fi
            cat "sec${d}.txt"
            if [ "$d" = "0" ] && { [ "$syms" != "0" ] || [ "$strs" != "0" ]; }; then
              echo "::error::DIAG=0 conserva diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
            if [ "$d" = "1" ] && { [ "$syms" = "0" ] || [ "$strs" = "0" ]; }; then
              echo "::error::DIAG=1 sin diagnostico (simbolos=$syms strings=$strs)"; exit 1
            fi
          done
          echo "== Secciones: DIAG=0 -> DIAG=1 (delta) =="
          while read -r name v0 _rest; do
            # Lectura shell pura (sin $1/$2 ni awk): inmune al quoting, tambien dentro de bash -c.
            v1=""
            while read -r sec_name sec_size _rest2; do
              if [ "$sec_name" = "$name" ]; then
                v1="$sec_size"
                break
              fi
            done < "sec1.txt"
            if [ -z "$v1" ]; then
              echo "::error::Seccion ${name} presente en DIAG=0 y AUSENTE en DIAG=1"
              exit 1
            fi
            echo "  ${name}: ${v0} -> ${v1} (delta $((v1 - v0)))"
          done < "sec0.txt"
          echo "OK: DIAG=0 limpio y DIAG=1 instrumentado"
      - name: Verificar pioarduino 54.03.20 + Arduino Core 3.2.0 + CSV compartido (desde el log verbose)
        run: |
          grep -F 'PLATFORM: Espressif 32 (54.3.20)' pio_build.log \
            || { echo "::error::plataforma != Espressif 32 (54.3.20) / pioarduino 54.03.20"; exit 1; }
          grep -F 'framework-arduinoespressif32 @ 3.2.0' pio_build.log \
            || { echo "::error::Arduino Core != 3.2.0"; exit 1; }
          grep -F 'partitions_huge_app.csv' pio_build.log \
            || { echo "::error::el build no referencia partitions_huge_app.csv (CSV compartido)"; exit 1; }
          echo "OK: pioarduino 54.03.20 + Arduino Core 3.2.0 + partitions_huge_app.csv confirmados en el log verbose"

