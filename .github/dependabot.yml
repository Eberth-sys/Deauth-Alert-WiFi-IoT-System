# Dependabot — actualizaciones de dependencias (DPS-01A, DPS-01B2).
# Solo habilita el monitoreo y la apertura de PRs; NO modifica versiones por sí mismo.
# Las alertas y las security updates se activan aparte en Settings -> Code security.
version: 2
updates:
  # -------------------- Frontend (npm) --------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]   # los majors quedan como PR individual (revisión manual)

  # -------------------- Backend (pip) --------------------
  # requirements.txt vive en /backend/src, no en /backend.
  - package-ecosystem: "pip"
    directory: "/backend/src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  # -------------------- Capa de procesamiento (pip) --------------------
  # requirements.txt vive en /processing-layer (pineado en DPS-01B).
  - package-ecosystem: "pip"
    directory: "/processing-layer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      processing-minor-patch:
        update-types: ["minor", "patch"]

  # -------------------- Imágenes base de los Dockerfiles --------------------
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # -------------------- Imágenes del docker-compose raíz --------------------
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
