<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#0a1224"/><stop offset="0.55" stop-color="#070b15"/><stop offset="1" stop-color="#05080f"/>
  </linearGradient>
  <radialGradient id="glowCyan" cx="0.84" cy="0.26" r="0.55">
    <stop offset="0" stop-color="#22d3ee" stop-opacity="0.16"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowBlue" cx="0.10" cy="0.92" r="0.55">
    <stop offset="0" stop-color="#3b82f6" stop-opacity="0.15"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="titleGrad" x1="78" y1="175" x2="430" y2="255" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#22d3ee"/><stop offset="0.5" stop-color="#38bdf8"/><stop offset="1" stop-color="#3b82f6"/>
  </linearGradient>
  <linearGradient id="divGrad" x1="80" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#22d3ee" stop-opacity="0.6"/><stop offset="0.55" stop-color="#3b82f6" stop-opacity="0.18"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="accentBar" x1="0" y1="540" x2="0" y2="602" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#3b82f6"/>
  </linearGradient>
  <linearGradient id="sweep" x1="0" y1="0" x2="300" y2="-150" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#22d3ee" stop-opacity="0.26"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#0891b2"/>
  </radialGradient>
  <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
    <path d="M0 0 H42 M0 0 V42" stroke="#94a3b8" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
</defs>

<rect width="1280" height="640" fill="url(#bg)"/>
<rect width="1280" height="640" fill="url(#grid)"/>
<rect width="1280" height="640" fill="url(#glowCyan)"/>
<rect width="1280" height="640" fill="url(#glowBlue)"/>


