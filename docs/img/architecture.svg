<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
  <title>Arquitectura del sistema Deauth-Alert en cuatro capas</title>
  <desc>Percepción (4 ESP32) por BLE hacia Raspberry Pi, que distribuye a PostgreSQL, AWS IoT y Telegram; backend FastAPI y frontend React.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9333EA"/>
    </marker>
    <marker id="aho" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#EA580C"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="660" fill="#ffffff"/>
  <text x="450" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Arquitectura del sistema</text>
  <text x="450" y="54" text-anchor="middle" font-size="12.5" fill="#64748b">Deauth-Alert · detección de ataques de deautenticación Wi-Fi (802.11)</text>

  <!-- PERCEPCIÓN -->
  <rect x="30" y="74" width="840" height="106" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="48" y="97" font-size="12.5" font-weight="700" fill="#1E3A8A">🛰️  PERCEPCIÓN — 4× ESP32-WROOM-32U · modo promiscuo (canales 1 / 6 / 11 + scanner)</text>
  <rect x="54" y="112" width="180" height="50" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="144" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">📡 Canal 1</text>
  <rect x="256" y="112" width="180" height="50" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="346" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">📡 Canal 6</text>
  <rect x="458" y="112" width="180" height="50" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="548" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">📡 Canal 11</text>
  <rect x="660" y="112" width="180" height="50" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="750" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">🔎 Scanner</text>

  <line x1="450" y1="180" x2="450" y2="212" stroke="#475569" stroke-width="1.8" marker-end="url(#ah)"/>
  <rect x="388" y="184" width="124" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="198" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">📶 BLE · GATT notify</text>

  <!-- PROCESAMIENTO -->
  <rect x="300" y="214" width="300" height="62" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#14532D">🍓 Raspberry Pi — Python / bleak</text>
  <text x="450" y="260" text-anchor="middle" font-size="11.5" fill="#166534">ingesta BLE · parseo · orquestación</text>

  <path d="M420,276 C360,290 200,300 165,336" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="450" y1="276" x2="450" y2="336" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M480,276 C540,290 700,300 735,336" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="250" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">persiste</text>
  <text x="470" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">publica</text>
  <text x="650" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">notifica</text>

  <!-- DISTRIBUCIÓN -->
  <rect x="30" y="338" width="840" height="98" rx="14" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="48" y="360" font-size="12.5" font-weight="700" fill="#5B21B6">📤  DISTRIBUCIÓN DEL EVENTO</text>
  <rect x="60" y="372" width="220" height="52" rx="10" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="170" y="403" text-anchor="middle" font-size="13.5" font-weight="600" fill="#581C87">🐘 PostgreSQL (Docker)</text>
  <rect x="340" y="372" width="220" height="52" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
  <text x="450" y="403" text-anchor="middle" font-size="13.5" font-weight="600" fill="#134E4A">☁️ AWS IoT · MQTT/TLS</text>
  <rect x="620" y="372" width="220" height="52" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
  <text x="730" y="403" text-anchor="middle" font-size="13.5" font-weight="600" fill="#075985">✈️ Telegram</text>

  <!-- APLICACIÓN -->
  <rect x="30" y="470" width="840" height="132" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="48" y="492" font-size="12.5" font-weight="700" fill="#7C2D12">💻  APLICACIÓN</text>
  <rect x="150" y="506" width="250" height="72" rx="12" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
  <text x="275" y="536" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7C2D12">⚙️ Backend — FastAPI</text>
  <text x="275" y="557" text-anchor="middle" font-size="11.5" fill="#9A3412">JWT · REST + WebSocket</text>
  <rect x="500" y="506" width="250" height="72" rx="12" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
  <text x="625" y="536" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7C2D12">🖥️ Frontend — React</text>
  <text x="625" y="557" text-anchor="middle" font-size="11.5" fill="#9A3412">Vite · TS · dashboard live</text>

  <path d="M170,424 C170,470 230,480 275,504" fill="none" stroke="#9333EA" stroke-width="1.8" marker-end="url(#ahp)"/>
  <rect x="120" y="452" width="96" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="168" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">lee / escribe</text>
  <line x1="400" y1="542" x2="500" y2="542" stroke="#EA580C" stroke-width="2" marker-end="url(#aho)"/>
  <rect x="404" y="532" width="92" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="546" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">WebSocket</text>

  <text x="450" y="628" text-anchor="middle" font-size="11" fill="#94a3b8">ESP32 detecta deauth → BLE → Raspberry Pi → (DB · nube · Telegram) → Backend → Dashboard</text>
</svg>
