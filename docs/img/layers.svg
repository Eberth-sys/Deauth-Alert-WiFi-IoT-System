<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
  <title>Las cuatro capas del sistema Deauth-Alert: percepción (ESP32), procesamiento (Raspberry Pi), backend (FastAPI) y frontend (React)</title>
  <desc>Tarjetas por capa con su carpeta, tecnología y rol.</desc>
  <rect x="0" y="0" width="880" height="480" fill="#ffffff"/>

  <!-- PERCEPTION -->
  <rect x="20" y="20" width="840" height="100" rx="14" fill="#F5F9FF" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="60" cy="70" r="22" fill="#ffffff" stroke="#2563EB" stroke-width="1.5"/>
  <text x="60" y="78" text-anchor="middle" font-size="22">🛰️</text>
  <text x="96" y="56" font-size="16.5" font-weight="700" fill="#1E3A8A">Perception</text>
  <rect x="96" y="66" width="132" height="22" rx="6" fill="#EFF2F7" stroke="#E2E8F0"/>
  <text x="106" y="81" font-size="11.5" font-family="ui-monospace, Consolas, monospace" fill="#475569">perception-layer/</text>
  <text x="340" y="46" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">TECNOLOGÍA</text>
  <text x="340" y="66" font-size="12.5" fill="#334155">ESP32-WROOM-32U</text>
  <text x="340" y="84" font-size="12.5" fill="#334155">C/C++ · Arduino .ino + ESP-IDF .c</text>
  <text x="616" y="46" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">ROL</text>
  <text x="616" y="66" font-size="12.5" fill="#334155">Captura de frames deauth en modo</text>
  <text x="616" y="84" font-size="12.5" fill="#334155">promiscuo; envío por BLE</text>

  <!-- PROCESSING -->
  <rect x="20" y="132" width="840" height="100" rx="14" fill="#F3FCF5" stroke="#16A34A" stroke-width="1.5"/>
  <circle cx="60" cy="182" r="22" fill="#ffffff" stroke="#16A34A" stroke-width="1.5"/>
  <text x="60" y="190" text-anchor="middle" font-size="22">🍓</text>
  <text x="96" y="168" font-size="16.5" font-weight="700" fill="#14532D">Processing</text>
  <rect x="96" y="178" width="128" height="22" rx="6" fill="#EFF2F7" stroke="#E2E8F0"/>
  <text x="106" y="193" font-size="11.5" font-family="ui-monospace, Consolas, monospace" fill="#475569">processing-layer/</text>
  <text x="340" y="158" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">TECNOLOGÍA</text>
  <text x="340" y="178" font-size="12.5" fill="#334155">Python · bleak · paho-mqtt · psycopg2</text>
  <text x="340" y="196" font-size="12.5" fill="#334155">Docker + PostgreSQL</text>
  <text x="616" y="158" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">ROL</text>
  <text x="616" y="178" font-size="12.5" fill="#334155">Ingesta BLE, persistencia y</text>
  <text x="616" y="196" font-size="12.5" fill="#334155">publicación MQTT/AWS IoT + Telegram</text>

  <!-- BACKEND -->
  <rect x="20" y="244" width="840" height="100" rx="14" fill="#FFF8F3" stroke="#EA580C" stroke-width="1.5"/>
  <circle cx="60" cy="294" r="22" fill="#ffffff" stroke="#EA580C" stroke-width="1.5"/>
  <text x="60" y="302" text-anchor="middle" font-size="22">⚙️</text>
  <text x="96" y="280" font-size="16.5" font-weight="700" fill="#7C2D12">Backend</text>
  <rect x="96" y="290" width="78" height="22" rx="6" fill="#EFF2F7" stroke="#E2E8F0"/>
  <text x="106" y="305" font-size="11.5" font-family="ui-monospace, Consolas, monospace" fill="#475569">backend/</text>
  <text x="340" y="270" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">TECNOLOGÍA</text>
  <text x="340" y="290" font-size="12.5" fill="#334155">FastAPI · SQLAlchemy</text>
  <text x="340" y="308" font-size="12.5" fill="#334155">PostgreSQL · JWT</text>
  <text x="616" y="270" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">ROL</text>
  <text x="616" y="290" font-size="12.5" fill="#334155">API REST + WebSocket</text>
  <text x="616" y="308" font-size="12.5" fill="#334155">+ autenticación (JWT)</text>

  <!-- FRONTEND -->
  <rect x="20" y="356" width="840" height="100" rx="14" fill="#F8F5FF" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="60" cy="406" r="22" fill="#ffffff" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="60" y="414" text-anchor="middle" font-size="22">🖥️</text>
  <text x="96" y="392" font-size="16.5" font-weight="700" fill="#5B21B6">Frontend</text>
  <rect x="96" y="402" width="82" height="22" rx="6" fill="#EFF2F7" stroke="#E2E8F0"/>
  <text x="106" y="417" font-size="11.5" font-family="ui-monospace, Consolas, monospace" fill="#475569">frontend/</text>
  <text x="340" y="382" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">TECNOLOGÍA</text>
  <text x="340" y="402" font-size="12.5" fill="#334155">React · Vite · TypeScript</text>
  <text x="340" y="420" font-size="12.5" fill="#334155">TailwindCSS</text>
  <text x="616" y="382" font-size="9.5" font-weight="700" letter-spacing="0.6" fill="#94a3b8">ROL</text>
  <text x="616" y="402" font-size="12.5" fill="#334155">Dashboard en tiempo real</text>
  <text x="616" y="420" font-size="12.5" fill="#334155">(alertas, reportes, estado)</text>
</svg>
