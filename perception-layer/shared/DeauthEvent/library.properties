name=DeauthEvent
version=1.1.0
author=Deauth-Alert Project
maintainer=Deauth-Alert Project
sentence=Modelo de evento de deautenticacion (POD 20 B), parser de BSSID, rate-limit e instrumentacion diagnostica.
paragraph=Helpers portables en C puro (seguros para C y C++), compartidos por los nodos ESP-IDF y Arduino. Sin FreeRTOS, atomicos ni hardware; verificables en host con unit tests, ASAN/UBSAN y enlace C/C++. El fuzzing reproducible (semilla fija) cubre el parser de BSSID de deauth_event; el rate-limit (F5-3) y la instrumentacion diagnostica (F6a-1) se validan con unit tests de limites, ASAN/UBSAN y enlace C/C++, SIN fuzzing propio. Incluye el modelo de evento (F4c-1), el rate-limit por (dst,subtype) (F5-3) y el helper de instrumentacion diagnostica (F6a-1). La cola FreeRTOS, el worker y los contadores con seccion critica portMUX viven en cada variante de firmware desde F4c-2.
category=Communication
