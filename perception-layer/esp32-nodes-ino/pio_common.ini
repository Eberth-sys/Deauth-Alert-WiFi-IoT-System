; pio_common.ini — configuracion comun de PlatformIO para los 4 nodos Arduino.
; Cada nodo tiene un platformio.ini minimo que hereda esta config via extra_configs.
; No afecta a Arduino IDE (que abre main.ino directamente).
[env]
; Plataforma FIJADA: pioarduino 54.03.20 = Arduino Core ESP32 3.2.0. No usar stable/latest/rama mutable.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = arduino
; Biblioteca compartida WifiMgmtParser (parser portable, F4b). Ruta relativa a la carpeta del nodo.
lib_extra_dirs = ../../shared
; Particion Huge APP compartida (ruta relativa a la carpeta del nodo). El firmware
; (~1.65 MB) no entra en la particion por defecto (1.3 MB); requiere ~3 MB de app.
board_build.partitions = ../partitions_huge_app.csv
monitor_speed = 115200
