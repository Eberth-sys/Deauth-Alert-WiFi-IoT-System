# frontend/nginx.conf — sirve el SPA (Vite build) con fallback de rutas (D4)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: las rutas de React Router (/logs, /reportes, /estadisticas, ...)
    # deben servir index.html en vez de 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para assets con hash de contenido (Vite los versiona).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
